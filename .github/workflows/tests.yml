name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mydatabase
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DB_NAME: mydatabase
      DB_USER: myuser
      DB_PASS: mypassword
      DB_HOST: localhost
      DB_PORT: "5432"
      SITE_DOMAIN: localhost:8000
      DJANGO_SETTINGS_MODULE: project.settings.e2e
      E2E_BASE_URL: http://127.0.0.1:8000
      E2E_USER_EMAIL: e2e@example.com
      E2E_USER_PASSWORD: e2e-password-123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: TypeScript checks
        run: npm run check

      - name: Django tests
        run: python manage.py test --settings=project.settings.test

      - name: Prepare E2E database
        run: |
          python manage.py migrate --noinput --settings=project.settings.e2e
          python manage.py seed_e2e_user --email "$E2E_USER_EMAIL" --username e2e-user --password "$E2E_USER_PASSWORD" --reset --settings=project.settings.e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start Django server
        run: |
          python manage.py runserver 0.0.0.0:8000 --settings=project.settings.e2e &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/login/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
