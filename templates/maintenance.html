<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>メンテナンス中 | Life management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    .icon-area {
      margin-bottom: 24px;
    }
    .icon-main {
      font-size: 72px;
      color: #764ba2;
      display: block;
      line-height: 1;
      animation: spin-slow 4s linear infinite;
    }
    @keyframes spin-slow {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(10deg); }
      75%  { transform: rotate(-10deg); }
      100% { transform: rotate(0deg); }
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 28px;
    }
    .message-box {
      background: #f8f6ff;
      border-left: 4px solid #764ba2;
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 28px;
    }
    .message-box p {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.7;
      margin: 0;
    }
    .humor {
      font-size: 0.88rem;
      color: #999;
      margin-bottom: 28px;
    }
    .humor i {
      color: #f0ad4e;
    }
    .status-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .status-item i {
      font-size: 1.4rem;
      color: #764ba2;
    }
    .status-item span {
      font-size: 0.8rem;
      color: #888;
    }
    .footer-note {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-area">
      <i class="fas fa-tools icon-main"></i>
    </div>

    <h1>ただいまメンテナンス中です</h1>
    <p class="subtitle">アップデート作業を実施しています。もう少々お待ちください。</p>

    <div class="message-box">
      <p>
        より良いサービスを提供するため、システムのアップデートを行っています。<br>
        作業完了後、自動的にご利用いただけるようになります。
      </p>
    </div>

    <p class="humor">
      <i class="fas fa-mug-hot"></i>
      コーヒーブレイク中...
    </p>

    <div class="status-row">
      <div class="status-item">
        <i class="fas fa-server"></i>
        <span>サーバー更新中</span>
      </div>
      <div class="status-item">
        <i class="fas fa-database"></i>
        <span>データ確認中</span>
      </div>
      <div class="status-item">
        <i class="fas fa-shield-alt"></i>
        <span>セキュリティ強化</span>
      </div>
    </div>

    <p class="footer-note">HTTP 503 &mdash; Service Temporarily Unavailable</p>
  </div>
</body>
</html>
