{# ボトムタブナビゲーション（モバイルのみ表示。デスクトップは _sidebar.html） #}
{% with url_name=request.resolver_match.url_name %}
<nav class="app-bottomnav" aria-label="ボトムナビゲーション">
  <a class="bottomnav-item {% if url_name == 'dashboard' or url_name == 'demo_home' %}active{% endif %}"
     href="{% if is_demo %}{% url 'demo_home' %}{% else %}{% url 'dashboard' %}{% endif %}">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 10.5 12 4l8.5 6.5V20h-5.5v-5.5h-6V20H3.5z"/></svg>
    ホーム
  </a>
  <a class="bottomnav-item {% if url_name == 'expense_list' or url_name == 'demo_expenses' %}active{% endif %}"
     href="{% if is_demo %}{% url 'demo_expenses' %}{% else %}{% url 'expense_list' %}{% endif %}">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18"/></svg>
    家計簿
  </a>
  <a class="bottomnav-item {% if url_name == 'task_list' or url_name == 'demo_tasks' %}active{% endif %}"
     href="{% if is_demo %}{% url 'demo_tasks' %}{% else %}{% url 'task_list' %}{% endif %}">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></svg>
    予定
  </a>
  <a class="bottomnav-item {% if url_name == 'habit_dashboard' or url_name == 'demo_habits' %}active{% endif %}"
     href="{% if is_demo %}{% url 'demo_habits' %}{% else %}{% url 'habit_dashboard' %}{% endif %}">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="m8.5 12.5 2.4 2.4 4.6-5.3"/></svg>
    習慣
  </a>
  <div class="dropup d-flex">
    <button type="button" class="bottomnav-item" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="false" aria-label="その他のメニュー">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5.5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18.5" cy="12" r="1.4"/></svg>
      その他
    </button>
    <div class="dropdown-menu dropdown-menu-right">
      {% if is_demo %}
        <a class="dropdown-item" href="{% url 'demo_board' %}">一時タスク</a>
        <a class="dropdown-item" href="{% url 'demo_memos' %}">メモ</a>
        <a class="dropdown-item" href="{% url 'demo_shopping' %}">買いものリスト</a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="{% url 'signup' %}">サインアップ</a>
      {% else %}
        <a class="dropdown-item" href="{% url 'temp_task_board' %}">一時タスク</a>
        <a class="dropdown-item" href="{% url 'memo_list' %}">メモ</a>
        <a class="dropdown-item" href="{% url 'shopping_list' %}">買いものリスト</a>
        {% if user.is_superuser %}
          <a class="dropdown-item" href="{% url 'manage_dashboard' %}">管理</a>
        {% endif %}
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="{% url 'contact' %}">お問い合わせ</a>
      {% endif %}
    </div>
  </div>
</nav>
{% endwith %}
