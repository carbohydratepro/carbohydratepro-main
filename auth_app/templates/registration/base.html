{% load static %}

<!doctype html>
<html lang="ja">
  <head>
    <title>{% block title %}Life management{% endblock %}</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- 互換表示の解除 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- SEO -->
    <meta name="description" content="{% block meta_description %}家計簿・タスク・習慣・メモを一元管理するライフマネジメントツールです。収支グラフ・カレンダー・習慣トラッカー・買い物リストなど豊富な機能を無料で利用できます。{% endblock %}">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">
    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Life management{% endblock %}">
    <meta property="og:description" content="{% block og_description %}家計簿・タスク・習慣・メモを一元管理するライフマネジメントツールです。{% endblock %}">
    <meta property="og:site_name" content="Life management">
    <meta property="og:locale" content="ja_JP">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}Life management{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}家計簿・タスク・習慣・メモを一元管理するライフマネジメントツールです。{% endblock %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="{% static 'app/rice-icon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'app/rice-icon.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'app/rice-icon.png' %}">

  </head>
  <body>
    <!-- ナビバー -->

    {% include "registration/_header.html" %}

    <!-- コンテンツ -->
    <div class="pl-4 small" style="background-color: #e2e3e5 ; border-bottom: solid 1px #f3f3f3;">
        {% if not user.is_authenticated %}
          こんにちは！ ゲスト さん
        {% else %}
          こんにちは！ {{ user.username }} さん
        {% endif %}
    </div>
      
    {% block content %}{% endblock %}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
